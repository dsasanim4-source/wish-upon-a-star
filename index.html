<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>祈愿 · 天天开心 ✨</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✨</text></svg>">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-deep: #06060f;
    --blue: #5b9bd5;
    --blue-light: #a0c4ff;
    --text-primary: #e0e8f0;
    --text-secondary: rgba(180, 200, 230, 0.55);
    --glass-bg: rgba(255, 255, 255, 0.03);
    --glass-border: rgba(255, 255, 255, 0.07);
    /* Day/night cycle variables */
    --sky-top: #0a1020;
    --sky-mid: #060818;
    --sky-bottom: #030410;
    --nebula-opacity: 1;
    --star-warmth: 210;
    --accent-hue: 215;
  }

  /* ── Day/Night Cycle ──────────────────── */
  :root.day-mode {
    --sky-top: #1a2a40;
    --sky-mid: #152030;
    --sky-bottom: #0a1520;
    --nebula-opacity: 0.5;
    --star-warmth: 40;
    --accent-hue: 30;
  }

  :root.sunrise-mode {
    --sky-top: #2a1530;
    --sky-mid: #1a1030;
    --sky-bottom: #0a0820;
    --nebula-opacity: 0.7;
    --star-warmth: 20;
    --accent-hue: 340;
  }

  :root.sunset-mode {
    --sky-top: #301a10;
    --sky-mid: #201010;
    --sky-bottom: #0a0808;
    --nebula-opacity: 0.8;
    --star-warmth: 15;
    --accent-hue: 10;
  }

  body {
    width: 100vw;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    background: var(--bg-deep);
    font-family: 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', 'Noto Sans SC', sans-serif;
    cursor: crosshair;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none;
    user-select: none;
    transition: background 2s ease;
  }

  canvas#starfield {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
  }

  /* ── Overlay ──────────────────────────── */
  .overlay {
    position: fixed;
    inset: 0;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    padding: 24px;
  }

  /* ── Glass Card ───────────────────────── */
  .glass-card {
    position: relative;
    background: var(--glass-bg);
    backdrop-filter: blur(24px) saturate(120%);
    -webkit-backdrop-filter: blur(24px) saturate(120%);
    border: 1px solid var(--glass-border);
    border-radius: 40px;
    padding: clamp(40px, 6vw, 72px) clamp(36px, 8vw, 88px);
    text-align: center;
    pointer-events: auto;
    transform: translate(var(--parallax-x, 0px), var(--parallax-y, 0px));
    transition: box-shadow 0.6s cubic-bezier(0.23, 1, 0.32, 1);
    box-shadow:
      0 0 0 1px rgba(255, 255, 255, 0.03) inset,
      0 8px 40px rgba(0, 0, 0, 0.4),
      0 0 80px rgba(80, 140, 220, 0.06);
    will-change: transform;
  }

  .glass-card:hover {
    transform: translate(var(--parallax-x, 0px), calc(var(--parallax-y, 0px) - 6px));
    box-shadow:
      0 0 0 1px rgba(255, 255, 255, 0.05) inset,
      0 16px 56px rgba(0, 0, 0, 0.5),
      0 0 120px rgba(80, 140, 220, 0.12);
  }

  .glass-card::before {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: 40px;
    padding: 1px;
    background: linear-gradient(
      135deg,
      rgba(255, 255, 255, 0.15) 0%,
      rgba(255, 255, 255, 0.02) 30%,
      rgba(255, 255, 255, 0) 50%,
      rgba(255, 255, 255, 0.02) 70%,
      rgba(255, 255, 255, 0.08) 100%
    );
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
  }

  .star-icon {
    display: inline-block;
    font-size: 28px;
    margin-bottom: 20px;
    animation: star-pulse 3s ease-in-out infinite;
    filter: drop-shadow(0 0 12px rgba(120, 170, 240, 0.5));
  }

  @keyframes star-pulse {
    0%, 100% { transform: scale(1); opacity: 0.7; }
    50% { transform: scale(1.25); opacity: 1; }
  }

  .wish-label {
    font-size: clamp(13px, 1.8vw, 15px);
    font-weight: 400;
    letter-spacing: 0.6em;
    color: var(--text-secondary);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .main-title {
    font-size: clamp(40px, 7vw, 72px);
    font-weight: 200;
    letter-spacing: 0.12em;
    color: var(--text-primary);
    line-height: 1.3;
    background: linear-gradient(180deg, #e0e8f8 0%, #8ab4d8 50%, #5b8fc0 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 24px rgba(80, 140, 210, 0.3));
    animation: title-float 6s ease-in-out infinite;
  }

  @keyframes title-float {
    0%, 100% { transform: translateY(0); }
    25% { transform: translateY(-6px); }
    75% { transform: translateY(4px); }
  }

  .divider {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(100, 150, 210, 0.5), transparent);
    margin: 28px auto;
  }

  .sub-text {
    font-size: clamp(13px, 1.5vw, 14px);
    font-weight: 300;
    letter-spacing: 0.25em;
    color: var(--text-secondary);
    font-style: italic;
  }

  /* ── Wish Category Tags ───────────────── */
  .wish-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 16px;
    pointer-events: auto;
    opacity: 0;
    transform: translateY(12px);
    transition: all 0.8s cubic-bezier(0.23, 1, 0.32, 1);
  }

  .wish-tags.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .wish-tag {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    background: rgba(255, 255, 255, 0.03);
    color: rgba(180, 200, 230, 0.6);
    font-size: 12px;
    font-weight: 300;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: all 0.3s ease;
    font-family: inherit;
    white-space: nowrap;
  }

  .wish-tag:hover, .wish-tag.active {
    border-color: rgba(120, 180, 240, 0.35);
    background: rgba(90, 155, 220, 0.12);
    color: rgba(180, 210, 255, 0.9);
    box-shadow: 0 0 16px rgba(80, 140, 220, 0.1);
  }

  /* ── Wish Counter ─────────────────────── */
  .wish-counter {
    margin-top: 36px;
    display: flex;
    align-items: baseline;
    gap: 6px;
    pointer-events: auto;
    opacity: 0;
    transform: translateY(12px);
    transition: all 0.8s cubic-bezier(0.23, 1, 0.32, 1);
  }

  .wish-counter.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .wish-count {
    font-size: 36px;
    font-weight: 200;
    color: var(--blue-light);
    font-variant-numeric: tabular-nums;
    font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
    text-shadow: 0 0 20px rgba(120, 180, 240, 0.4);
  }

  .wish-label-small {
    font-size: 14px;
    font-weight: 300;
    color: var(--text-secondary);
    letter-spacing: 0.15em;
  }

  /* ── Instruction ──────────────────────── */
  .instruction {
    position: fixed;
    bottom: clamp(32px, 5vh, 48px);
    left: 50%;
    transform: translateX(-50%);
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 0.2em;
    color: rgba(255, 255, 255, 0.3);
    z-index: 2;
    pointer-events: none;
    animation: fade-hint 4s ease-in-out infinite;
  }

  @keyframes fade-hint {
    0%, 100% { opacity: 0.25; }
    50% { opacity: 0.55; }
  }

  /* ── Ripple ───────────────────────────── */
  .ripple {
    position: fixed;
    border-radius: 50%;
    border: 1px solid rgba(120, 180, 240, 0.4);
    animation: ripple-out 1.2s ease-out forwards;
    pointer-events: none;
    z-index: 3;
  }

  @keyframes ripple-out {
    0% { width: 0; height: 0; opacity: 0.8; }
    100% { width: 160px; height: 160px; opacity: 0; margin-left: -80px; margin-top: -80px; }
  }

  /* ── Wish Input ──────────────────────── */
  .wish-input-area {
    margin-top: 28px;
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--glass-bg);
    backdrop-filter: blur(16px) saturate(120%);
    -webkit-backdrop-filter: blur(16px) saturate(120%);
    border: 1px solid var(--glass-border);
    border-radius: 50px;
    padding: 6px 6px 6px 22px;
    pointer-events: auto;
    opacity: 0;
    transform: translateY(12px);
    transition: all 0.8s cubic-bezier(0.23, 1, 0.32, 1),
                border-color 0.4s ease,
                box-shadow 0.4s ease;
    max-width: 360px;
    width: 100%;
  }

  .wish-input-area:focus-within {
    border-color: rgba(100, 160, 230, 0.3);
    box-shadow: 0 0 20px rgba(100, 160, 230, 0.08);
  }

  .wish-input-area.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .wish-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    font-size: 14px;
    font-family: inherit;
    font-weight: 300;
    color: #c8d8f0;
    letter-spacing: 0.08em;
    min-width: 0;
  }

  .wish-input::placeholder {
    color: rgba(255, 255, 255, 0.2);
    letter-spacing: 0.08em;
  }

  .wish-input:focus::placeholder {
    color: rgba(255, 255, 255, 0.1);
  }

  .wish-send-btn {
    flex-shrink: 0;
    width: 38px;
    height: 38px;
    border-radius: 50%;
    border: 1px solid rgba(255, 255, 255, 0.1);
    background: rgba(255, 255, 255, 0.04);
    color: rgba(120, 180, 240, 0.6);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    font-family: inherit;
    line-height: 1;
  }

  .wish-send-btn:hover {
    background: rgba(100, 160, 240, 0.1);
    border-color: rgba(100, 160, 240, 0.3);
    color: rgba(140, 200, 255, 0.9);
    box-shadow: 0 0 16px rgba(100, 160, 240, 0.15);
  }

  .wish-send-btn:active {
    transform: scale(0.9);
  }

  /* ── Floating Wishes ────────────────── */
  .floating-wishes {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .floating-wish {
    position: absolute;
    bottom: -30px;
    white-space: nowrap;
    font-size: 14px;
    font-weight: 300;
    letter-spacing: 0.1em;
    color: rgba(160, 200, 240, 0.45);
    text-shadow: 0 0 10px rgba(120, 180, 240, 0.25);
    animation: wish-float-up 10s ease-in forwards;
    font-family: inherit;
  }

  @keyframes wish-float-up {
    0% { transform: translateY(0); opacity: 0; }
    8% { opacity: 0.5; }
    60% { opacity: 0.35; }
    100% { transform: translateY(-105vh); opacity: 0; }
  }

  /* ── Message Popup ────────────────────── */
  .msg-popup-overlay {
    position: fixed;
    inset: 0;
    z-index: 10;
    background: rgba(0, 0, 0, 0.55);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: auto;
    opacity: 0;
    transition: opacity 0.35s ease;
  }

  .msg-popup-overlay.show {
    opacity: 1;
  }

  .msg-popup-overlay.hidden {
    pointer-events: none;
    opacity: 0;
  }

  .msg-popup {
    position: relative;
    background: rgba(14, 16, 28, 0.88);
    backdrop-filter: blur(30px) saturate(140%);
    -webkit-backdrop-filter: blur(30px) saturate(140%);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 28px;
    padding: 36px 32px 28px;
    text-align: center;
    max-width: 340px;
    width: 90%;
    transform: translateY(20px) scale(0.92);
    transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1);
    box-shadow:
      0 0 0 1px rgba(255, 255, 255, 0.03) inset,
      0 24px 64px rgba(0, 0, 0, 0.6),
      0 0 80px rgba(80, 140, 220, 0.08);
  }

  .msg-popup-overlay.show .msg-popup {
    transform: translateY(0) scale(1);
  }

  .msg-popup::before {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: 28px;
    padding: 1px;
    background: linear-gradient(
      135deg,
      rgba(120, 180, 240, 0.2) 0%,
      rgba(120, 180, 240, 0.04) 40%,
      rgba(255, 255, 255, 0) 60%,
      rgba(120, 180, 240, 0.08) 100%
    );
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
  }

  .msg-popup-icon {
    font-size: 32px;
    margin-bottom: 12px;
    animation: star-pulse 2s ease-in-out infinite;
  }

  .msg-popup-title {
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.2em;
    color: rgba(140, 190, 240, 0.7);
    margin-bottom: 14px;
  }

  .msg-popup-text {
    font-size: 16px;
    font-weight: 300;
    letter-spacing: 0.06em;
    color: #e0e8f0;
    line-height: 1.6;
    margin-bottom: 6px;
    word-break: break-word;
  }

  .msg-popup-time {
    font-size: 11px;
    font-weight: 300;
    color: rgba(255, 255, 255, 0.3);
    letter-spacing: 0.08em;
    margin-bottom: 18px;
  }

  .msg-popup-dismiss {
    font-size: 12px;
    font-weight: 300;
    letter-spacing: 0.15em;
    color: rgba(140, 190, 240, 0.5);
    cursor: pointer;
    background: none;
    border: none;
    font-family: inherit;
    padding: 8px 20px;
    transition: color 0.3s;
  }

  .msg-popup-dismiss:hover {
    color: rgba(160, 210, 255, 0.9);
  }

  /* ── Bottle Button ────────────────────── */
  .bottle-btn {
    position: fixed;
    bottom: clamp(80px, 12vh, 110px);
    right: clamp(20px, 4vw, 32px);
    z-index: 5;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 1px solid rgba(255, 255, 255, 0.1);
    background: rgba(14, 16, 28, 0.7);
    backdrop-filter: blur(16px) saturate(140%);
    -webkit-backdrop-filter: blur(16px) saturate(140%);
    color: rgba(120, 180, 240, 0.7);
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.35s ease;
    pointer-events: auto;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    line-height: 1;
  }

  .bottle-btn:hover {
    border-color: rgba(120, 180, 240, 0.3);
    color: rgba(160, 210, 255, 0.95);
    box-shadow: 0 4px 24px rgba(80, 140, 220, 0.12);
    transform: translateY(-2px);
  }

  .bottle-btn:active {
    transform: scale(0.9);
  }

  .bottle-badge {
    position: absolute;
    top: -4px;
    right: -4px;
    min-width: 18px;
    height: 18px;
    border-radius: 9px;
    background: rgba(90, 155, 220, 0.9);
    color: #fff;
    font-size: 10px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 5px;
    transition: transform 0.3s ease;
    line-height: 1;
  }

  .bottle-badge:empty {
    display: none;
  }

  /* ── Bottle Panel ─────────────────────── */
  .bottle-panel {
    position: fixed;
    bottom: 0;
    right: 0;
    z-index: 8;
    width: 100%;
    max-width: 400px;
    height: 50vh;
    max-height: 460px;
    background: rgba(10, 12, 22, 0.92);
    backdrop-filter: blur(28px) saturate(140%);
    -webkit-backdrop-filter: blur(28px) saturate(140%);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 28px 28px 0 0;
    display: flex;
    flex-direction: column;
    transform: translateY(100%);
    transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1);
    pointer-events: auto;
    box-shadow:
      0 -8px 40px rgba(0, 0, 0, 0.5),
      0 0 0 1px rgba(255, 255, 255, 0.02) inset;
  }

  .bottle-panel.open {
    transform: translateY(0);
  }

  .bottle-panel::before {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: 28px 28px 0 0;
    padding: 1px;
    background: linear-gradient(
      180deg,
      rgba(120, 180, 240, 0.15) 0%,
      rgba(120, 180, 240, 0.03) 30%,
      rgba(255, 255, 255, 0) 70%,
      rgba(120, 180, 240, 0.05) 100%
    );
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
  }

  .bottle-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 24px 14px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    flex-shrink: 0;
  }

  .bottle-title {
    font-size: 15px;
    font-weight: 400;
    letter-spacing: 0.15em;
    color: rgba(140, 190, 240, 0.85);
  }

  .bottle-close {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 1px solid rgba(255, 255, 255, 0.08);
    background: rgba(255, 255, 255, 0.03);
    color: rgba(255, 255, 255, 0.4);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s;
    font-family: inherit;
    line-height: 1;
  }

  .bottle-close:hover {
    border-color: rgba(255, 255, 255, 0.2);
    color: rgba(255, 255, 255, 0.8);
  }

  .bottle-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    -webkit-overflow-scrolling: touch;
  }

  .bottle-body::-webkit-scrollbar { width: 2px; }
  .bottle-body::-webkit-scrollbar-track { background: transparent; }
  .bottle-body::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.06); border-radius: 1px; }

  .bottle-unread-section { text-align: center; width: 100%; }

  .bottle-unread-count {
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 0.1em;
    color: var(--text-secondary);
    margin-bottom: 14px;
  }

  .bottle-open-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 32px;
    border-radius: 50px;
    border: 1px solid rgba(120, 180, 240, 0.3);
    background: rgba(90, 155, 220, 0.1);
    color: rgba(160, 210, 255, 0.9);
    font-size: 15px;
    font-weight: 300;
    letter-spacing: 0.12em;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.35s ease;
    box-shadow: 0 0 20px rgba(80, 140, 220, 0.08);
  }

  .bottle-open-btn:hover {
    background: rgba(90, 155, 220, 0.18);
    border-color: rgba(140, 200, 255, 0.5);
    box-shadow: 0 0 30px rgba(80, 140, 220, 0.18);
    transform: translateY(-1px);
  }

  .bottle-open-btn:active { transform: scale(0.95); }
  .bottle-open-btn:disabled { opacity: 0.3; cursor: not-allowed; pointer-events: none; }

  .bottle-divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(120, 180, 240, 0.15), transparent);
    flex-shrink: 0;
  }

  .bottle-input-section { width: 100%; text-align: center; }

  .bottle-input-label {
    font-size: 12px;
    font-weight: 300;
    letter-spacing: 0.1em;
    color: rgba(255, 255, 255, 0.3);
    margin-bottom: 10px;
  }

  .bottle-input-area { display: flex; align-items: center; gap: 8px; width: 100%; }

  .bottle-input {
    flex: 1;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 24px;
    padding: 10px 18px;
    font-size: 13px;
    font-family: inherit;
    font-weight: 300;
    color: #c8d8f0;
    letter-spacing: 0.05em;
    outline: none;
    transition: border-color 0.3s;
    min-width: 0;
  }

  .bottle-input::placeholder { color: rgba(255, 255, 255, 0.18); }
  .bottle-input:focus { border-color: rgba(120, 180, 240, 0.3); }

  .bottle-send-btn {

    async function loadFromSupabase() {
      // Always load local data first
      loadWishesFromStorage();
      loadTimeCapsulesFromStorage();
      if (wishMessages.length > 0) {
        totalWishes = wishMessages.length;
        lastWishCount = totalWishes;
        wishCountEl.textContent = totalWishes;
      }
      updateTimeCapsuleBadge();

      if (!supabase) return;
      try {
        const { data: wishesData } = await supabase
          .from('wishes').select('*').order('created_at', { ascending: true });
        if (wishesData && wishesData.length > 0) {
          // Merge: Supabase wishes take precedence, dedup by id
          const localIds = new Set(wishMessages.map(w => String(w.id)));
          wishesData.forEach(w => {
            if (!localIds.has(String(w.id))) {
              wishMessages.push(w);
            }
          });
          // Sort by created_at
          wishMessages.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
          totalWishes = wishMessages.length;
          lastWishCount = totalWishes;
          wishCountEl.textContent = totalWishes;
          connectionDot.classList.remove('offline');
          connectionDot.textContent = '已连接';
        }
        // Load capsules
        const { data: capsData } = await supabase
          .from('time_capsules').select('*').order('reveal_date', { ascending: true });
        if (capsData && capsData.length > 0) {
          const localCapIds = new Set(timeCapsules.map(c => String(c.id)));
          capsData.forEach(c => {
            if (!localCapIds.has(String(c.id))) {
              timeCapsules.push(c);
            }
          });
          saveTimeCapsulesToStorage();
          updateTimeCapsuleBadge();
        }
        await refreshUnreadCount();
      } catch(e) {
        console.warn('Supabase 加载失败，使用本地数据:', e);
        connectionDot.classList.add('offline');
        connectionDot.textContent = '离线模式';
      }
    }

    function setupRealtime() {
      if (!supabase) return;
      supabase.channel('wishes-realtime')
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'wishes' }, (payload) => {
          const newWish = payload.new;
          if (localInsertIds.has(newWish.id)) { localInsertIds.delete(newWish.id); return; }
          // Check if a local wish with same text already exists (dedup)
          const dupIdx = wishMessages.findIndex(w => String(w.id).startsWith('local_') && w.text === newWish.text);
          if (dupIdx >= 0) {
            // Replace local placeholder with server version
            wishMessages[dupIdx] = newWish;
            localInsertIds.add(newWish.id);
            if (wishwallPanel.classList.contains('show')) renderWishWall();
            return;
          }
          wishMessages.push(newWish);
          totalWishes = wishMessages.length;
          lastWishCount = totalWishes;
          wishCountEl.textContent = totalWishes;
          spawnFloatingWish(newWish.text);
          const rect = glassCard.getBoundingClientRect();
          const cx = rect.left + rect.width / 2 + (Math.random() - 0.5) * 200;
          const cy = rect.top + rect.height / 2 + (Math.random() - 0.5) * 100;
          createLantern(cx, cy, newWish.text, newWish.tag || 'general');
          if (wishwallPanel.classList.contains('show')) renderWishWall();
          if (totalWishes >= 3) { instruction.style.opacity = '0'; instruction.style.transition = 'opacity 1s ease'; }
          treeGrowth += 0.02;
          updateTreeWishes();
        }).subscribe();

      supabase.channel('messages-realtime')
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, (payload) => {
          if (localInsertIds.has(payload.new.id)) { localInsertIds.delete(payload.new.id); return; }
          if (!payload.new.revealed) { totalUnreadMessages++; lastUnreadCount = totalUnreadMessages; updateBottleBadge(); updateBottlePanel(); }
        })
        .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'messages' }, (payload) => {
          if (localUpdateIds.has(payload.new.id)) { localUpdateIds.delete(payload.new.id); return; }
          if (payload.new.revealed && !payload.old.revealed) { totalUnreadMessages = Math.max(0, totalUnreadMessages - 1); lastUnreadCount = totalUnreadMessages; updateBottleBadge(); updateBottlePanel(); }
        }).subscribe();

      supabase.channel('capsules-realtime')
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'time_capsules' }, (payload) => {
          timeCapsules.push(payload.new);
          saveTimeCapsulesToStorage();
          updateTimeCapsuleBadge();
          if (timecapsulePanel.classList.contains('open')) renderTimeCapsules();
        }).subscribe();
    }

    function escapeHTML(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function formatTime(ts) {
      const d = new Date(ts);
      const now = new Date();
      const diff = now - d;
      if (diff < 60000) return '刚刚';
      if (diff < 3600000) return Math.floor(diff / 60000) + ' 分钟前';
      if (diff < 86400000) return Math.floor(diff / 3600000) + ' 小时前';
      if (diff < 172800000) return '昨天';
      const month = d.getUTCMonth() + 1;
      const day = d.getUTCDate();
      const hours = String((d.getUTCHours() + 8) % 24).padStart(2, '0');
      const minutes = String(d.getUTCMinutes()).padStart(2, '0');
      return `${month}/${day} ${hours}:${minutes}`;
    }

    function formatDate(ts) {
      // Display in Beijing time (UTC+8)
      const d = new Date(new Date(ts).getTime() + 8 * 60 * 60 * 1000);
      return `${d.getUTCFullYear()}/${d.getUTCMonth()+1}/${d.getUTCDate()}`;
    }

    function detectTag(text) {
      const lower = text.toLowerCase();
      const keywords = {
        love: ['爱', '恋', '喜欢', '情', 'love', '心动', '在一起', '表白', '暗恋', '对象'],
        dream: ['梦想', '梦想', '理想', '目标', 'dream', '未来', '希望', '成为', '努力'],
        family: ['家', '爸爸', '妈妈', '父母', '孩子', '宝宝', '亲', '家庭', '弟', '姐', '哥', '妹'],
        health: ['健康', '身体', '病', '康复', '平安', '健康', '锻炼', '减肥', '瘦'],
        wealth: ['钱', '财', '富', '赚', '工资', '奖金', '发财', '中奖', '买'],
        study: ['学', '考', '试', '成绩', '毕业', '大学', '高中', '书', 'study', '读'],
        travel: ['旅行', '旅游', '去', '世界', '走', '飞', '远方', '山海', '出行'],
      };
      for (const [tag, words] of Object.entries(keywords)) {
        if (words.some(w => lower.includes(w))) return tag;
      }
      return 'general';
    }

    async function dismissPopup() {
      if (popupTimer) clearTimeout(popupTimer);

        const cap = pendingBurnCapsule;

          await supabase.from('time_capsules').delete().eq('id', cap.id);

        saveTimeCapsulesToStorage();
        updateTimeCapsuleBadge();

    async function revealMessage() {
      if (!supabase || totalUnreadMessages <= 0) return;
      bottleOpenBtn.disabled = true;
      bottleOpenBtn.textContent = '⏳ 正在打开…';
      const { data: msgs, error } = await supabase
        .from('messages').select('*').eq('revealed', false).order('created_at', { ascending: true }).limit(1);
      if (error || !msgs || msgs.length === 0) {
        bottleOpenBtn.disabled = false;
        bottleOpenBtn.innerHTML = '<span>📭</span> 打开漂流瓶';
        return;
      }
      const msg = msgs[0];
      const { error: updateError } = await supabase.from('messages').update({ revealed: true }).eq('id', msg.id);
      if (updateError) { bottleOpenBtn.disabled = false; bottleOpenBtn.innerHTML = '<span>📭</span> 打开漂流瓶'; return; }
      localUpdateIds.add(msg.id);
      totalUnreadMessages = Math.max(0, totalUnreadMessages - 1);
      lastUnreadCount = totalUnreadMessages;
      updateBottleBadge();
      updateBottlePanel();
      bottleOpenBtn.innerHTML = '<span>📭</span> 打开漂流瓶';
      closeBottlePanel();
      setTimeout(() => showMessagePopup(msg), 500);
    }

    async function submitBottleMessage() {
      const text = bottleInput.value.trim();
      if (!text) return;
      bottleInput.value = '';
      if (!supabase) return;
      const { data: inserted, error } = await supabase
        .from('messages').insert({ text, revealed: false }).select().single();
      if (error || !inserted) { console.warn('留言提交失败:', error); return; }
      localInsertIds.add(inserted.id);
      totalUnreadMessages++;
      lastUnreadCount = totalUnreadMessages;
      updateBottleBadge();
      updateBottlePanel();
    }

    function renderWishWall() {
      wishwallBody.innerHTML = '';
      if (wishMessages.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'wishwall-empty';
        empty.textContent = '还没有心愿，快来许一个吧 ✨';
        wishwallBody.appendChild(empty);
        return;
      }
      const sorted = [...wishMessages].reverse();
      const stars = ['⭐', '🌟', '✨', '💫', '🌠', '⭐', '✨', '🌟', '💫', '🌠'];
      sorted.forEach((wish, i) => {
        const card = document.createElement('div');
        card.className = 'wish-card';
        const star = stars[i % stars.length];
        const time = formatTime(wish.created_at);
        let tag = wish.tag;
        if (!tag || tag === 'general') {
          tag = detectTag(wish.text || '');
        }
        const cat = CATEGORIES[tag] || CATEGORIES.general;
        card.innerHTML = `
          <span class="wish-card-star">${star}</span>
          <span class="wish-card-text">${escapeHTML(wish.text)}</span>
          <span class="wish-card-tag">${cat.icon} ${cat.name}</span>
          <span class="wish-card-time">${time}</span>
        `;
        wishwallBody.appendChild(card);
      });
    }

    function renderTimeCapsules() {
      timecapsuleList.innerHTML = '';
      const now = new Date();
      const sorted = [...timeCapsules].sort((a, b) => new Date(a.reveal_date) - new Date(b.reveal_date));
      if (sorted.length === 0) {
        const empty = document.createElement('div');
        empty.style.cssText = 'text-align:center;padding:20px;color:rgba(255,255,255,0.2);font-size:13px;';
        empty.textContent = '还没有时光胶囊，封存一个吧 ⏳';
        timecapsuleList.appendChild(empty);
        return;
      }
      sorted.forEach(cap => {
        const isReady = new Date(cap.reveal_date) <= now;
        const mine = isMyCapsule(cap);
        const displayText = getCapsuleDisplayText(cap);
        const card = document.createElement('div');
        card.className = 'timecapsule-capsule';
        card.style.cssText = isReady && mine && !cap.revealed ? 'border-color: rgba(180,140,240,0.3);' : '';
        card.innerHTML = `
          <span class="timecapsule-capsule-icon">${isReady ? (mine ? '🔓' : '🔒') : '🔒'}</span>
          <span class="timecapsule-capsule-text">${isReady && mine && !cap.revealed ? escapeHTML(displayText) : (isReady ? '📦 他人封存' : '📦 封存中…')}</span>
          <span class="timecapsule-capsule-date">${formatDate(cap.reveal_date)}</span>
        `;
        if (isReady && mine && !cap.revealed) {
          card.style.cursor = 'pointer';
          card.addEventListener('click', async () => {
            pendingBurnCapsule = cap;
            showMessagePopup({ text: displayText, created_at: cap.created_at });
            msgPopupTitle.textContent = '🔥 阅后即焚 · 来自过去的你';
            updateTimeCapsuleBadge();
            renderTimeCapsules();
          });
        }
        timecapsuleList.appendChild(card);
      });
    }

      if (!id) {
        id = 'dev_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 8);
        localStorage.setItem('wish_device_id', id);
      }
      return id;
    }
    function packCapsuleText(text, deviceId) {
      return '[' + deviceId + ']' + text;
    }
    function unpackCapsuleText(packed) {
      if (!packed) return { deviceId: null, text: '' };
      const match = packed.match(/^\[([^\]]+)\](.*)/);
      if (match) return { deviceId: match[1], text: match[2] };
      return { deviceId: null, text: packed };
    }
    function isMyCapsule(cap) {
      return unpackCapsuleText(cap.text || '').deviceId === getDeviceId();
    }
    function getCapsuleDisplayText(cap) {
      return unpackCapsuleText(cap.text || '').text;
    }

    async function submitTimeCapsule() {
      const text = timecapsuleInput.value.trim();
      const date = timecapsuleDate.value;
      if (!text || !date) return;
      timecapsuleInput.value = '';
      const deviceId = getDeviceId();
      const packedText = packCapsuleText(text, deviceId);
      // Store as midnight Beijing time (UTC+8) so comparison is consistent
      const beijingMidnight = new Date(date + 'T00:00:00+08:00');
      const capsule = {
        text: packedText,
        reveal_date: beijingMidnight.toISOString(),
        revealed: false,
        created_at: new Date().toISOString(),
      };
      if (supabase) {
        const { data: inserted, error } = await supabase.from('time_capsules').insert(capsule).select().single();
        if (inserted) {
          localInsertIds.add(inserted.id);
          timeCapsules.push(inserted);
        } else {
          // Fallback: add locally if Supabase insert fails
          console.warn('时光胶囊提交失败，使用本地存储:', error);
          capsule.id = 'local_' + Date.now().toString();
          timeCapsules.push(capsule);
        }
      } else {
        capsule.id = Date.now().toString();
        timeCapsules.push(capsule);
      }
      // Persist to localStorage
      saveTimeCapsulesToStorage();
      updateTimeCapsuleBadge();
      renderTimeCapsules();
    }

    function saveWishesToStorage() {
      try {
        // Only save non-Supabase wishes (those with local_ prefix)
        const localWishes = wishMessages.filter(w => String(w.id).startsWith('local_'));
        if (localWishes.length > 0) {
          localStorage.setItem('wish_wishes', JSON.stringify(localWishes));
        }
      } catch(e) { /* quota exceeded */ }
    }

    function loadWishesFromStorage() {
      try {
        const stored = localStorage.getItem('wish_wishes');
        if (stored) {
          const parsed = JSON.parse(stored);
          if (Array.isArray(parsed) && parsed.length > 0) {
            const existingTexts = new Set(wishMessages.map(w => w.text + '_' + w.created_at));
            parsed.forEach(w => {
              const key = (w.text || '') + '_' + (w.created_at || '');
              if (!existingTexts.has(key)) {
                wishMessages.push(w);
                existingTexts.add(key);
              }
            });
          }
        }
      } catch(e) { /* ignore */ }
    }

    function saveTimeCapsulesToStorage() {
      try {
        localStorage.setItem('wish_time_capsules', JSON.stringify(timeCapsules));
      } catch(e) { /* quota exceeded, ignore */ }
    }

    function loadTimeCapsulesFromStorage() {
      try {
        const stored = localStorage.getItem('wish_time_capsules');
        if (stored) {
          const parsed = JSON.parse(stored);
          if (Array.isArray(parsed) && parsed.length > 0) {
            // Merge with existing (Supabase-loaded) capsules, dedup by id
            const existingIds = new Set(timeCapsules.map(c => c.id));
            parsed.forEach(c => {
              if (!existingIds.has(c.id)) {
                timeCapsules.push(c);
                existingIds.add(c.id);
              }
            });
          }
        }
      } catch(e) { /* ignore parse errors */ }
    }

    function scheduleMeteorShower() {
      const now = Date.now();
      const nextShower = Math.ceil(now / CONFIG.meteorShowerInterval) * CONFIG.meteorShowerInterval;
      const delay = nextShower - now;
      if (meteorShowerTimer) clearTimeout(meteorShowerTimer);
      meteorShowerTimer = setTimeout(() => {
        startMeteorShower();
        scheduleMeteorShower();
      }, delay);
      updateMeteorCountdown(nextShower);
    }

    function updateMeteorCountdown(nextShower) {
      const update = () => {
        if (meteorShowerActive) return;
        const now = Date.now();
        const remaining = Math.max(0, nextShower - now);
        const mins = Math.floor(remaining / 60000);
        const secs = Math.floor((remaining % 60000) / 1000);
        meteorCountdown.textContent = `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
        if (remaining > 0 && !meteorShowerActive) {
          requestAnimationFrame(() => setTimeout(update, 1000));
        }
      };
      update();
    }

    function startMeteorShower() {
      meteorShowerActive = true;
      meteorShowerEnd = Date.now() + 60000; // 1 minute shower
      meteorBanner.classList.add('show');
      meteorBannerText.textContent = '🌠 流星雨来啦！快许愿吧！';
      meteorCountdown.textContent = '✨';

      // Burst of shooting stars
      const burstInterval = setInterval(() => {
        if (!meteorShowerActive || Date.now() > meteorShowerEnd) {
          clearInterval(burstInterval);
          return;
        }
        for (let i = 0; i < 3; i++) {
          spawnShootingStar();
        }
      }, 800);

      // Auto-dismiss after shower
      setTimeout(() => {
        meteorShowerActive = false;
        meteorBanner.classList.remove('show');
        meteorBannerText.textContent = '流星雨即将来临';
        clearInterval(burstInterval);
      }, 60000);
    }

    meteorBannerDismiss.addEventListener('click', (e) => {
      e.stopPropagation();
      meteorBanner.classList.remove('show');
    });

       ═══════════════════════════════════════════════════════════════════════ */
    function openGalaxyMap() {

      void galaxyPanel.offsetWidth;

    function renderGalaxyLegend() {
      galaxyLegend.innerHTML = '';
      Object.entries(CATEGORIES).forEach(([key, cat]) => {
        const item = document.createElement('span');
        item.className = 'galaxy-legend-item';
        item.innerHTML = `<span class="galaxy-legend-dot" style="background:${cat.color}"></span>${cat.icon} ${cat.name}`;
        galaxyLegend.appendChild(item);
      });
    }

    function resizeGalaxyCanvas() {
      const wrap = galaxyCanvasWrap;
      galaxyCanvas.width = wrap.clientWidth * 2;
      galaxyCanvas.height = wrap.clientHeight * 2;
      galaxyCtx.setTransform(1, 0, 0, 1, 0, 0);
    }

    function renderGalaxyMap() {
      const cw = galaxyCanvas.width;
      const ch = galaxyCanvas.height;
      galaxyCtx.clearRect(0, 0, cw, ch);

      // Background
      galaxyCtx.fillStyle = '#060610';
      galaxyCtx.fillRect(0, 0, cw, ch);

      // Draw nebula blobs for background
      for (let i = 0; i < 5; i++) {
        const gx = (Math.sin(i * 2.3) * 0.3 + 0.5) * cw;
        const gy = (Math.cos(i * 1.7) * 0.3 + 0.5) * ch;
        const gr = Math.min(cw, ch) * 0.2;
        const grad = galaxyCtx.createRadialGradient(gx, gy, 0, gx, gy, gr);
        grad.addColorStop(0, 'rgba(40,60,120,0.15)');
        grad.addColorStop(1, 'transparent');
        galaxyCtx.fillStyle = grad;
        galaxyCtx.fillRect(0, 0, cw, ch);
      }

      // Apply pan & zoom
      galaxyCtx.save();
      galaxyCtx.translate(cw / 2 + galaxyPan.x, ch / 2 + galaxyPan.y);
      galaxyCtx.scale(galaxyPan.zoom, galaxyPan.zoom);

      // Group wishes by tag (use detectTag as fallback if tag is 'general')
      const groups = {};
      wishMessages.forEach(w => {
        let tag = w.tag;
        if (!tag || tag === 'general') {
          tag = detectTag(w.text || '');
        }
        if (!groups[tag]) groups[tag] = [];
        groups[tag].push(w);
      });

      // Draw galaxy clusters
      const baseRadius = Math.min(cw, ch) * 0.25;
      const angleStep = (Math.PI * 2) / Math.max(Object.keys(groups).length, 1);
      let angleIdx = 0;

      Object.entries(groups).forEach(([tag, wishes]) => {
        const cat = CATEGORIES[tag] || CATEGORIES.general;
        const cx = Math.cos(angleStep * angleIdx) * baseRadius * 0.5;
        const cy = Math.sin(angleStep * angleIdx) * baseRadius * 0.5;
        angleIdx++;

        // Draw cluster glow
        const clusterGrad = galaxyCtx.createRadialGradient(cx, cy, 0, cx, cy, 60);
        clusterGrad.addColorStop(0, cat.color.replace(')', ',0.3)').replace('rgb', 'rgba'));
        clusterGrad.addColorStop(1, 'transparent');
        galaxyCtx.fillStyle = clusterGrad;
        galaxyCtx.beginPath();
        galaxyCtx.arc(cx, cy, 60, 0, Math.PI * 2);
        galaxyCtx.fill();

        // Draw individual wish stars (deterministic positions based on wish index)
        wishes.forEach((w, i) => {
          const angle = (i / Math.max(wishes.length, 1)) * Math.PI * 2;
          // Use a seeded pseudo-random based on wish index
          const seed = (i * 2654435761) & 0xFFFFFFFF;
          const dist = 15 + ((seed % 1000) / 1000) * 40;
          const sx = cx + Math.cos(angle) * dist;
          const sy = cy + Math.sin(angle) * dist;

          galaxyCtx.beginPath();
          galaxyCtx.arc(sx, sy, 2.5, 0, Math.PI * 2);
          galaxyCtx.fillStyle = cat.color;
          galaxyCtx.fill();

          galaxyCtx.beginPath();
          galaxyCtx.arc(sx, sy, 6, 0, Math.PI * 2);
          galaxyCtx.fillStyle = cat.color.replace(')', ',0.15)').replace('rgb', 'rgba');
          galaxyCtx.fill();
        });

        // Label
        galaxyCtx.fillStyle = 'rgba(255,255,255,0.6)';
        galaxyCtx.font = '18px "PingFang SC","Microsoft YaHei",sans-serif';
        galaxyCtx.textAlign = 'center';
        galaxyCtx.fillText(`${cat.icon} ${cat.name} (${wishes.length})`, cx, cy - 50);
      });

      // Draw saved constellations from localStorage
      drawSavedConstellationsOnGalaxy(cw, ch);

      galaxyCtx.restore();
    }

    function drawSavedConstellationsOnGalaxy(cw, ch) {
      try {
        const saved = JSON.parse(localStorage.getItem('constellations') || '[]');
        if (!saved.length) return;
        // Position saved constellations at the bottom-right area of the galaxy map
        const offsetX = cw * 0.25;
        const offsetY = ch * 0.25;
        const scale = Math.min(cw, ch) * 0.0012;
        saved.forEach((constellation, ci) => {
          if (!constellation.stars || constellation.stars.length < 2) return;
          // Calculate centroid of constellation stars
          const cx_s = constellation.stars.reduce((s, st) => s + st.x, 0) / constellation.stars.length;
          const cy_s = constellation.stars.reduce((s, st) => s + st.y, 0) / constellation.stars.length;
          // Position each constellation in a grid
          const row = Math.floor(ci / 3);
          const col = ci % 3;
          const baseX = offsetX + col * 180;
          const baseY = offsetY + row * 150;
          // Draw constellation lines
          if (constellation.lines) {
            constellation.lines.forEach(line => {
              const from = constellation.stars[line.from];
              const to = constellation.stars[line.to];
              if (from && to) {
                galaxyCtx.beginPath();
                galaxyCtx.moveTo(
                  baseX + (from.x - cx_s) * scale,
                  baseY + (from.y - cy_s) * scale
                );
                galaxyCtx.lineTo(
                  baseX + (to.x - cx_s) * scale,
                  baseY + (to.y - cy_s) * scale
                );
                galaxyCtx.strokeStyle = 'rgba(255,200,100,0.5)';
                galaxyCtx.lineWidth = 1.5;
                galaxyCtx.setLineDash([4, 4]);
                galaxyCtx.stroke();
                galaxyCtx.setLineDash([]);
              }
            });
          }
          // Draw constellation stars
          constellation.stars.forEach(s => {
            const sx = baseX + (s.x - cx_s) * scale;
            const sy = baseY + (s.y - cy_s) * scale;
            galaxyCtx.beginPath();
            galaxyCtx.arc(sx, sy, 3, 0, Math.PI * 2);
            galaxyCtx.fillStyle = 'rgba(255,220,140,0.8)';
            galaxyCtx.fill();
            galaxyCtx.beginPath();
            galaxyCtx.arc(sx, sy, 8, 0, Math.PI * 2);
            galaxyCtx.fillStyle = 'rgba(255,200,100,0.15)';
            galaxyCtx.fill();
          });
          // Label
          galaxyCtx.fillStyle = 'rgba(255,220,150,0.7)';
          galaxyCtx.font = '13px "PingFang SC","Microsoft YaHei",sans-serif';
          galaxyCtx.textAlign = 'center';
          galaxyCtx.fillText(constellation.name || '我的星座', baseX, baseY - 40);
        });
      } catch(e) { /* ignore */ }
    }

    /* ═══════════════════════════════════════════════════════════════════════
       FEATURE 8: GROWTH TREE
       ═══════════════════════════════════════════════════════════════════════ */
    function openTreePanel() {
      treePanel.classList.add('show');
      resizeTreeCanvas();
      renderTree();
    }

    function closeTreePanel() {
      treePanel.classList.remove('show');
    }

    function resizeTreeCanvas() {
      const body = document.getElementById('treeBody');
      treeCanvas.width = body.clientWidth * 2;
      treeCanvas.height = body.clientHeight * 2;
    }

    function updateTreeWishes() {
      treeWishes = wishMessages.slice(-20);
      if (treePanel.classList.contains('show')) renderTree();
    }

    function renderTree() {
      const cw = treeCanvas.width;
      const ch = treeCanvas.height;
      treeCtx.clearRect(0, 0, cw, ch);

      // Draw ground
      const groundY = ch * 0.85;
      const groundGrad = treeCtx.createLinearGradient(0, groundY, 0, ch);
      groundGrad.addColorStop(0, 'rgba(20,40,30,0.3)');
      groundGrad.addColorStop(1, 'rgba(10,20,15,0.6)');
      treeCtx.fillStyle = groundGrad;
      treeCtx.fillRect(0, groundY, cw, ch - groundY);

      // Draw tree
      const trunkX = cw / 2;
      const trunkBase = groundY;
      const growth = Math.min(1, 0.3 + (wishMessages.length / 50) * 0.7);
      const trunkHeight = ch * 0.5 * growth;

      // Trunk
      treeCtx.strokeStyle = 'rgba(80,120,80,0.7)';
      treeCtx.lineWidth = 8 * growth;
      treeCtx.lineCap = 'round';
      treeCtx.beginPath();
      treeCtx.moveTo(trunkX, trunkBase);
      treeCtx.lineTo(trunkX, trunkBase - trunkHeight);
      treeCtx.stroke();

      // Draw branches recursively
      function drawBranch(x, y, length, angle, depth, maxDepth) {
        if (depth > maxDepth || length < 5) return;

        const endX = x + Math.cos(angle) * length;
        const endY = y + Math.sin(angle) * length;

        const alpha = 0.5 + depth / maxDepth * 0.3;
        treeCtx.strokeStyle = `rgba(80,140,80,${alpha})`;
        treeCtx.lineWidth = Math.max(1, length * 0.08);
        treeCtx.beginPath();
        treeCtx.moveTo(x, y);
        treeCtx.lineTo(endX, endY);
        treeCtx.stroke();

        // Leaves at tips
        if (depth >= maxDepth - 1) {
          // Wish leaves
          const wishIdx = Math.floor(Math.random() * wishMessages.length);
          if (wishMessages.length > 0) {
            const leafGrad = treeCtx.createRadialGradient(endX, endY, 0, endX, endY, 8);
            const colors = ['rgba(100,200,100,0.4)', 'rgba(150,220,150,0.35)', 'rgba(80,180,120,0.4)', 'rgba(200,230,100,0.35)'];
            leafGrad.addColorStop(0, colors[depth % colors.length]);
            leafGrad.addColorStop(1, 'transparent');
            treeCtx.fillStyle = leafGrad;
            treeCtx.beginPath();
            treeCtx.arc(endX, endY, 8, 0, Math.PI * 2);
            treeCtx.fill();
          }
        }

        drawBranch(endX, endY, length * 0.7, angle - 0.5, depth + 1, maxDepth);
        drawBranch(endX, endY, length * 0.7, angle + 0.5, depth + 1, maxDepth);
        if (depth < maxDepth - 1) {
          drawBranch(endX, endY, length * 0.5, angle - 0.2, depth + 1, maxDepth);
        }
      }

      const maxDepth = Math.floor(3 + growth * 4);
      drawBranch(trunkX, trunkBase - trunkHeight, trunkHeight * 0.6, -Math.PI / 2, 0, maxDepth);

      // Draw wish count
      treeCtx.fillStyle = 'rgba(255,255,255,0.5)';
      treeCtx.font = '20px "PingFang SC","Microsoft YaHei",sans-serif';
      treeCtx.textAlign = 'center';
      treeCtx.fillText(`🌱 ${wishMessages.length} 个愿望滋养着这棵树`, cw / 2, 40);
    }

    /* ═══════════════════════════════════════════════════════════════════════
       FEATURE 9: SUNRISE / SUNSET CYCLE
       ═══════════════════════════════════════════════════════════════════════ */
    function updateDayNightCycle() {
      // Use Beijing time (UTC+8)
      const now = new Date();
      const beijingHour = (now.getUTCHours() + 8) % 24;
      const root = document.documentElement;
      let mode, icon, text;

      if (beijingHour >= 5 && beijingHour < 7) {
        mode = 'sunrise'; icon = '🌅'; text = '日出';
      } else if (beijingHour >= 7 && beijingHour < 17) {
        mode = 'day'; icon = '☀️'; text = '白天';
      } else if (beijingHour >= 17 && beijingHour < 19) {
        mode = 'sunset'; icon = '🌇'; text = '日落';
      } else {
        mode = 'night'; icon = '🌙'; text = '深夜';
      }

      // Remove all modes
      root.classList.remove('day-mode', 'sunrise-mode', 'sunset-mode');
      if (mode !== 'night') {
        root.classList.add(mode + '-mode');
      }

      // Set sky colors for canvas rendering
      const skyPresets = {
        night:     { bgTop: '#0a1020', bgMid: '#060818', bgBottom: '#030410', vignetteColor: 'rgba(2, 2, 8, 0.55)' },
        day:       { bgTop: '#4a7a9c', bgMid: '#2a5070', bgBottom: '#102840', vignetteColor: 'rgba(2, 4, 10, 0.25)' },
        sunrise:   { bgTop: '#5a3060', bgMid: '#3a2040', bgBottom: '#1a1028', vignetteColor: 'rgba(4, 2, 6, 0.35)' },
        sunset:    { bgTop: '#6a4030', bgMid: '#402020', bgBottom: '#1a1010', vignetteColor: 'rgba(4, 2, 2, 0.4)' },
      };
      skyColors = skyPresets[mode] || skyPresets.night;

      dayNightMode = mode;
      const indicator = daynightIndicator.querySelector('.daynight-icon');
      const indicatorText = daynightIndicator.querySelector('.daynight-text');
      if (indicator) indicator.textContent = icon;
      if (indicatorText) indicatorText.textContent = text;

      // Adjust nebula colors based on time
      initNebula();
    }

    // Update every minute
    updateDayNightCycle();
    setInterval(updateDayNightCycle, 60000);

    /* ═══════════════════════════════════════════════════════════════════════
       FEATURE 10: COLLABORATIVE CONSTELLATION DRAWING
       ═══════════════════════════════════════════════════════════════════════ */
    function toggleConstellationMode() {
      constellationDrawMode = !constellationDrawMode;
      if (constellationDrawMode) {
        constellationBtn.classList.add('active');
        constellationToolbar.classList.add('show');
        canvas.style.cursor = 'crosshair';
        document.body.style.cursor = 'crosshair';
      } else {
        constellationBtn.classList.remove('active');
        constellationToolbar.classList.remove('show');
        canvas.style.cursor = 'crosshair';
        document.body.style.cursor = 'crosshair';
        constellationConnectMode = false;
        constellationConnect.classList.remove('active');
        lastDrawnStar = null;
      }
    }

    function addDrawnStar(x, y) {
      drawnStars.push({ x, y, id: Date.now() });
      if (constellationConnectMode && lastDrawnStar !== null) {
        drawnLines.push({ from: lastDrawnStar, to: drawnStars.length - 1 });
      }
      lastDrawnStar = drawnStars.length - 1;
    }

    function clearDrawnConstellation() {
      drawnStars = [];
      drawnLines = [];
      lastDrawnStar = null;
    }

    function saveConstellation() {
      if (drawnStars.length < 2) return;
      const name = prompt('给你的星座起个名字吧：', '我的星座');
      if (!name) return;
      const constellation = {
        name,
        stars: [...drawnStars],
        lines: [...drawnLines],
        created_at: new Date().toISOString(),
      };
      // Save to localStorage
      const saved = JSON.parse(localStorage.getItem('constellations') || '[]');
      saved.push(constellation);
      localStorage.setItem('constellations', JSON.stringify(saved));
      clearDrawnConstellation();
      toggleConstellationMode();
      alert(`✨ 星座"${name}"已保存！`);
    }

    constellationBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleConstellationMode(); });
    constellationAddStar.addEventListener('click', (e) => { e.stopPropagation(); constellationConnectMode = false; constellationConnect.classList.remove('active'); });
    constellationConnect.addEventListener('click', (e) => {
      e.stopPropagation();
      constellationConnectMode = !constellationConnectMode;
      if (constellationConnectMode) {
        constellationConnect.classList.add('active');
      } else {
        constellationConnect.classList.remove('active');
        lastDrawnStar = null;
      }
    });
    constellationClear.addEventListener('click', (e) => { e.stopPropagation(); clearDrawnConstellation(); });
    constellationSave.addEventListener('click', (e) => { e.stopPropagation(); saveConstellation(); });

    // Override click handler for constellation mode
    canvas.addEventListener('click', (e) => {
      if (!constellationDrawMode) return;
      e.stopPropagation();
      addDrawnStar(e.clientX, e.clientY);
    });

    /* ═══════════════════════════════════════════════════════════════════════
       DRAW CONSTELLATION LINES (on main canvas)
       ═══════════════════════════════════════════════════════════════════════ */
    function drawDrawnConstellation() {
      if (!constellationDrawMode || drawnStars.length === 0) return;

      // Draw lines
      drawnLines.forEach(line => {
        const from = drawnStars[line.from];
        const to = drawnStars[line.to];
        if (from && to) {
          ctx.beginPath();
          ctx.moveTo(from.x, from.y);
          ctx.lineTo(to.x, to.y);
          ctx.strokeStyle = 'rgba(255,200,100,0.5)';
          ctx.lineWidth = 1.5;
          ctx.setLineDash([4, 4]);
          ctx.stroke();
          ctx.setLineDash([]);
        }
      });

      // Draw stars
      drawnStars.forEach(s => {
        const glow = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, 12);
        glow.addColorStop(0, 'rgba(255,220,140,0.6)');
        glow.addColorStop(0.5, 'rgba(255,180,60,0.2)');
        glow.addColorStop(1, 'transparent');
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(s.x, s.y, 12, 0, Math.PI * 2);
        ctx.fill();

        ctx.beginPath();
        ctx.arc(s.x, s.y, 3, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,240,200,0.9)';
        ctx.fill();
      });
    }

    /* ═══════════════════════════════════════════════════════════════════════
       FEATURE 1: CONSTELLATION SYSTEM (category-based)
       ═══════════════════════════════════════════════════════════════════════ */
    function drawCategoryConstellations() {
      // Group settled stars by category from wish messages
      const tagStars = {};
      wishMessages.forEach((wish, i) => {
        let tag = wish.tag;
        if (!tag || tag === 'general') {
          tag = detectTag(wish.text || '');
        }
        if (!tagStars[tag]) tagStars[tag] = [];
        if (i < settledStars.length) {
          tagStars[tag].push(settledStars[i]);
        }
      });

      // Draw constellation lines for each category with >= 3 stars
      const constellationShapes = {
        love: (pts) => { /* heart shape */ return pts; },
        dream: (pts) => { /* arrow shape */ return pts; },
        family: (pts) => { /* house shape */ return pts; },
        health: (pts) => { /* cross shape */ return pts; },
        wealth: (pts) => { /* diamond shape */ return pts; },
        study: (pts) => { /* star shape */ return pts; },
        travel: (pts) => { /* bird shape */ return pts; },
        general: (pts) => { /* circle shape */ return pts; },
      };

      Object.entries(tagStars).forEach(([tag, stars]) => {
        if (stars.length < 3) return;
        const cat = CATEGORIES[tag] || CATEGORIES.general;
        const color = cat.color;

        // Draw faint lines between stars of same category
        ctx.strokeStyle = color.replace(')', ',0.15)').replace('rgb', 'rgba');
        ctx.lineWidth = 0.5;
        ctx.setLineDash([3, 8]);
        ctx.beginPath();
        for (let i = 0; i < stars.length; i++) {
          const next = (i + 1) % stars.length;
          ctx.moveTo(stars[i].x, stars[i].y);
          ctx.lineTo(stars[next].x, stars[next].y);
        }
        ctx.stroke();
        ctx.setLineDash([]);

        // Draw category label at centroid
        if (stars.length >= 3) {
          const cx = stars.reduce((s, st) => s + st.x, 0) / stars.length;
          const cy = stars.reduce((s, st) => s + st.y, 0) / stars.length;
          ctx.fillStyle = color.replace(')', ',0.3)').replace('rgb', 'rgba');
          ctx.font = '11px "PingFang SC","Microsoft YaHei",sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText(`${cat.icon} ${cat.name}`, cx, cy - 20);
        }
      });
    }

    /* ═══════════════════════════════════════════════════════════════════════
       RESIZE
       ═══════════════════════════════════════════════════════════════════════ */
    function resize() {
      W = canvas.width = window.innerWidth;
