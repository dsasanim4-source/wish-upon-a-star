    /* ═══════════════════════════════════════════════════════════════════════
       AUDIO
       ═══════════════════════════════════════════════════════════════════════ */
    function initAudio() {
      if (audioCtx) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        return;
      }
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { audioCtx = null; }
      if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playChime() {
      if (!audioCtx) return;
      if (audioCtx.state === 'suspended') { audioCtx.resume(); }
      const now = audioCtx.currentTime;
      const notes = [523.25, 659.25, 783.99];
      notes.forEach((freq, i) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0, now + i * 0.06);
        gain.gain.linearRampToValueAtTime(CONFIG.chimeVolume, now + i * 0.06 + 0.04);
        gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.06 + 0.9);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now + i * 0.06);
        osc.stop(now + i * 0.06 + 0.95);
      });
    }

    /* ═══════════════════════════════════════════════════════════════════════
       NEBULA
       ═══════════════════════════════════════════════════════════════════════ */
    function initNebula() {
      nebulaBlobs = [];
      const mode = dayNightMode;
      const colorSets = {
        night: [{ h: 215, s: 45, l: 22 }, { h: 230, s: 35, l: 18 }, { h: 200, s: 40, l: 20 }, { h: 240, s: 30, l: 16 }],
        day: [{ h: 200, s: 50, l: 50 }, { h: 210, s: 45, l: 45 }, { h: 190, s: 48, l: 48 }, { h: 220, s: 42, l: 42 }],
        sunrise: [{ h: 340, s: 40, l: 20 }, { h: 20, s: 35, l: 18 }, { h: 350, s: 38, l: 19 }, { h: 10, s: 30, l: 17 }],
        sunset: [{ h: 20, s: 45, l: 20 }, { h: 10, s: 40, l: 18 }, { h: 30, s: 35, l: 19 }, { h: 15, s: 38, l: 17 }],
      };
      const colors = colorSets[mode] || colorSets.night;
      for (let i = 0; i < CONFIG.nebulaCount; i++) {
        const c = colors[i % colors.length];
        nebulaBlobs.push({
          x: W * (0.2 + Math.random() * 0.6),
          y: H * (0.2 + Math.random() * 0.6),
          r: Math.min(W, H) * (0.35 + Math.random() * 0.45),
          dx: (Math.random() - 0.5) * 0.08,
          dy: (Math.random() - 0.5) * 0.06,
          h: c.h, s: c.s, l: c.l,
        });
      }
    }

    function drawNebula() {
      nebulaBlobs.forEach(b => {
        b.x += b.dx;
        b.y += b.dy;
        if (b.x < -b.r) b.x = W + b.r;
        if (b.x > W + b.r) b.x = -b.r;
        if (b.y < -b.r) b.y = H + b.r;
        if (b.y > H + b.r) b.y = -b.r;
        const grad = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r);
        grad.addColorStop(0, `hsla(${b.h}, ${b.s}%, ${b.l}%, 0.12)`);
        grad.addColorStop(0.4, `hsla(${b.h}, ${b.s}%, ${b.l}%, 0.06)`);
        grad.addColorStop(1, 'transparent');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);
      });
    }

    /* ═══════════════════════════════════════════════════════════════════════
       BACKGROUND STARS
       ═══════════════════════════════════════════════════════════════════════ */
    function initBgStars() {
      bgStars = [];
      for (let i = 0; i < CONFIG.bgStarCount; i++) {
        bgStars.push({
          x: Math.random() * W,
          y: Math.random() * H,
          r: Math.random() * 1.6 + 0.2,
          baseAlpha: Math.random() * 0.45 + 0.15,
          twinkleSpeed: Math.random() * 0.015 + 0.003,
          twinkleOffset: Math.random() * Math.PI * 2,
          hue: Math.random() < 0.08 ? 200 + Math.random() * 30 : 210 + Math.random() * 50,
        });
      }
    }

    function drawBgStars() {
      bgStars.forEach(s => {
        const alpha = s.baseAlpha + Math.sin(time * s.twinkleSpeed + s.twinkleOffset) * 0.25;
        const a = Math.max(0.05, Math.min(0.9, alpha));
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${s.hue}, 25%, 78%, ${a})`;
        ctx.fill();
        if (s.r > 0.8) {
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r * 3, 0, Math.PI * 2);
          ctx.fillStyle = `hsla(${s.hue}, 25%, 78%, ${a * 0.1})`;
          ctx.fill();
        }
      });
    }

    /* ═══════════════════════════════════════════════════════════════════════
       HEART CONSTELLATION
       ═══════════════════════════════════════════════════════════════════════ */
    function generateHeartPoints() {
      heartPoints = [];
      const cx = W * 0.5;
      const cy = H * 0.28;
      const scale = Math.min(W, H) * 0.14;
      for (let i = 0; i < CONFIG.heartPoints; i++) {
        const t = (i / CONFIG.heartPoints) * Math.PI * 2;
        const x = 16 * Math.pow(Math.sin(t), 3);
        const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
        heartPoints.push({
          x: cx + x * scale * 0.55,
          y: cy + y * scale * 0.55,
          occupied: false,
        });
      }
    }

    function drawHeartConstellation() {
      if (heartPoints.length < 2) return;
      ctx.beginPath();
      ctx.moveTo(heartPoints[0].x, heartPoints[0].y);
      for (let i = 1; i < heartPoints.length; i++) {
        ctx.lineTo(heartPoints[i].x, heartPoints[i].y);
      }
      ctx.closePath();
      ctx.strokeStyle = 'rgba(100, 150, 210, 0.1)';
      ctx.lineWidth = 0.5;
      ctx.setLineDash([2, 6]);
      ctx.stroke();
      ctx.setLineDash([]);
      settledStars.forEach(s => {
        const pulse = 1 + Math.sin(time * 0.03 + s.pulseOffset) * 0.25;
        const alpha = 0.55 + Math.sin(time * 0.03 + s.pulseOffset) * 0.3;
        const glow = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.r * 8 * pulse);
        glow.addColorStop(0, `rgba(120, 180, 240, ${alpha * 0.5})`);
        glow.addColorStop(0.5, `rgba(90, 150, 220, ${alpha * 0.12})`);
        glow.addColorStop(1, 'transparent');
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r * 8 * pulse, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r * pulse, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(200, 225, 255, ${alpha})`;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r * 0.4 * pulse, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(230, 245, 255, ${alpha + 0.2})`;
        ctx.fill();
      });
    }

    /* ═══════════════════════════════════════════════════════════════════════
       SHOOTING STARS
       ═══════════════════════════════════════════════════════════════════════ */
    function spawnShootingStar() {
      const angle = Math.PI * 0.15 + Math.random() * Math.PI * 0.35;
      const speed = meteorShowerActive ? 8 + Math.random() * 14 : 6 + Math.random() * 10;
      const len = meteorShowerActive ? 80 + Math.random() * 140 : 60 + Math.random() * 100;
      const startX = Math.random() * W * 0.6;
      const startY = Math.random() * H * 0.4;
      shootingStars.push({
        x: startX, y: startY,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 1,
        decay: 0.008 + Math.random() * 0.02,
        len,
      });
    }

    function drawShootingStars() {
      for (let i = shootingStars.length - 1; i >= 0; i--) {
        const s = shootingStars[i];
        s.x += s.vx;
        s.y += s.vy;
        s.life -= s.decay;
        if (s.life <= 0) { shootingStars.splice(i, 1); continue; }
        const tailX = s.x - s.vx * s.len * 0.06;
        const tailY = s.y - s.vy * s.len * 0.06;
        const grad = ctx.createLinearGradient(s.x, s.y, tailX, tailY);
        grad.addColorStop(0, `rgba(255, 255, 255, ${s.life})`);
        grad.addColorStop(0.1, `rgba(200, 225, 255, ${s.life * 0.8})`);
        grad.addColorStop(1, 'rgba(255, 255, 255, 0)');
        ctx.beginPath();
        ctx.moveTo(s.x, s.y);
        ctx.lineTo(tailX, tailY);
        ctx.strokeStyle = grad;
        ctx.lineWidth = meteorShowerActive ? 1.8 : 1.2;
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(s.x, s.y, meteorShowerActive ? 3.5 : 2.5, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 255, 255, ${s.life})`;
        ctx.fill();
      }
    }

    /* ═══════════════════════════════════════════════════════════════════════
       WISH LANTERNS
       ═══════════════════════════════════════════════════════════════════════ */
    function createLantern(x, y, message, tag) {
      if (lanterns.length >= CONFIG.maxLanterns) return;
      const targetIdx = settledStars.length;
      let tx, ty;
      if (targetIdx < heartPoints.length) {
        tx = heartPoints[targetIdx].x;
        ty = heartPoints[targetIdx].y;
      } else {
        const cx = W * 0.5;
        const cy = H * 0.28;
        const spread = Math.min(W, H) * 0.2;
        tx = cx + (Math.random() - 0.5) * spread * 2;
        ty = cy + (Math.random() - 0.5) * spread * 1.5;
      }
      lanterns.push({
        x, y, tx, ty,
        message: message || '',
        tag: tag || 'general',
        phase: 'rising',
        progress: 0,
        wobbleOffset: Math.random() * Math.PI * 2,
        wobbleAmp: 0.3 + Math.random() * 0.5,
        createdAt: time,
        settleDuration: 80 + Math.random() * 40,
      });
    }

    function drawLanterns() {
      for (let i = lanterns.length - 1; i >= 0; i--) {
        const l = lanterns[i];
        if (l.phase === 'rising') {
          const dx = l.tx - l.x;
          const dy = l.ty - l.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 15) {
            l.phase = 'settling';
            l.settleStart = time;
          } else {
            const speed = CONFIG.lanternRiseSpeed + dist * 0.002;
            const wobX = Math.sin(time * 0.04 + l.wobbleOffset) * l.wobbleAmp;
            const wobY = Math.cos(time * 0.035 + l.wobbleOffset) * l.wobbleAmp * 0.6;
            l.x += (dx / dist) * speed + wobX;
            l.y += (dy / dist) * speed + wobY;
          }
          if (Math.random() < 0.6) {
            particles.push({
              x: l.x + (Math.random() - 0.5) * 4,
              y: l.y + (Math.random() - 0.5) * 4,
              vx: (Math.random() - 0.5) * 0.3,
              vy: -Math.random() * 0.5 - 0.1,
              life: 1, decay: 0.02 + Math.random() * 0.04,
              r: Math.random() * 1.5 + 0.3,
            });
          }
        }
        if (l.phase === 'settling') {
          const elapsed = time - l.settleStart;
          const t = Math.min(elapsed / l.settleDuration, 1);
          l.x += (l.tx - l.x) * 0.12;
          l.y += (l.ty - l.y) * 0.12;
          if (t >= 1 || (Math.abs(l.x - l.tx) < 0.5 && Math.abs(l.y - l.ty) < 0.5)) {
            l.phase = 'settled';
            l.x = l.tx;
            l.y = l.ty;
            settledStars.push({
              x: l.x, y: l.y,
              r: 1.2 + Math.random() * 1,
              pulseOffset: Math.random() * Math.PI * 2,
              tag: l.tag,
            });
            lanterns.splice(i, 1);
            continue;
          }
        }
        const cat = CATEGORIES[l.tag] || CATEGORIES.general;
        const alpha = l.phase === 'settling' ? 0.8 : 0.9;
        const r = l.phase === 'settling' ? 3 : 4;
        const glow = ctx.createRadialGradient(l.x, l.y, 0, l.x, l.y, r * 6);
        glow.addColorStop(0, `rgba(160, 210, 255, ${alpha * 0.7})`);
        glow.addColorStop(0.3, `rgba(100, 170, 240, ${alpha * 0.3})`);
        glow.addColorStop(0.7, `rgba(60, 120, 200, ${alpha * 0.06})`);
        glow.addColorStop(1, 'transparent');
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(l.x, l.y, r * 6, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(l.x, l.y, r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(200, 230, 255, ${alpha})`;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(l.x, l.y, r * 0.5, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(240, 248, 255, 1)`;
        ctx.fill();
        if (l.message) {
          const textAlpha = l.phase === 'settling' ? 0.45 : 0.7;
          ctx.save();
          ctx.font = '13px "PingFang SC", "Microsoft YaHei", "Hiragino Sans GB", sans-serif';
          ctx.textAlign = 'center';
          ctx.fillStyle = `rgba(200, 230, 255, ${textAlpha})`;
          ctx.shadowColor = `rgba(120, 180, 240, ${textAlpha * 0.6})`;
          ctx.shadowBlur = 6;
          ctx.fillText(l.message, l.x, l.y - 18);
          ctx.restore();
        }
      }
    }

    /* ═══════════════════════════════════════════════════════════════════════
       PARTICLES
       ═══════════════════════════════════════════════════════════════════════ */
    function drawParticles() {
      while (particles.length > CONFIG.maxParticles) particles.shift();
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.life -= p.decay;
        if (p.life <= 0) { particles.splice(i, 1); continue; }
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(140, 200, 240, ${p.life * 0.6})`;
        ctx.fill();
      }
    }

    /* ═══════════════════════════════════════════════════════════════════════
       MAIN RENDER LOOP
       ═══════════════════════════════════════════════════════════════════════ */
    function draw() {
      ctx.clearRect(0, 0, W, H);
      const bgGrad = ctx.createRadialGradient(W * 0.5, H * 0.4, 0, W * 0.5, H * 0.5, Math.max(W, H) * 0.8);
      bgGrad.addColorStop(0, skyColors.bgTop);
      bgGrad.addColorStop(0.5, skyColors.bgMid);
      bgGrad.addColorStop(1, skyColors.bgBottom);
      ctx.fillStyle = bgGrad;
      ctx.fillRect(0, 0, W, H);
      drawNebula();
      drawBgStars();
      drawCategoryConstellations();
      drawHeartConstellation();
      drawShootingStars();
      drawParticles();
      drawLanterns();
      drawDrawnConstellation();
      const vignette = ctx.createRadialGradient(W * 0.5, H * 0.5, W * 0.35, W * 0.5, H * 0.5, W * 0.75);
      vignette.addColorStop(0, 'transparent');
      vignette.addColorStop(1, skyColors.vignetteColor);
      ctx.fillStyle = vignette;
      ctx.fillRect(0, 0, W, H);
    }

    function loop(ts) {
      time = ts;
      mouseX += (targetMouseX - mouseX) * 0.05;
      mouseY += (targetMouseY - mouseY) * 0.05;
      draw();
      requestAnimationFrame(loop);
    }

    /* ═══════════════════════════════════════════════════════════════════════
       EVENT HANDLERS
       ═══════════════════════════════════════════════════════════════════════ */
    function handleInteraction(ex, ey, message, forceTag) {
      initAudio();
      playChime();
      const tag = forceTag || (message ? detectTag(message) : selectedTag);
      createLantern(ex, ey, message, tag);
      if (message) {
        const isFirstWish = totalWishes === 0;
        totalWishes++;
        wishCountEl.textContent = totalWishes;
        spawnFloatingWish(message);
        if (isFirstWish) setTimeout(scheduleFloatingWishes, 3000);
      }
      if (!wishCounter.classList.contains('visible')) wishCounter.classList.add('visible');
      if (!wishInputArea.classList.contains('visible')) wishInputArea.classList.add('visible');
      if (!wishTags.classList.contains('visible')) wishTags.classList.add('visible');
      if (totalWishes >= 3) {
        instruction.style.opacity = '0';
        instruction.style.transition = 'opacity 1s ease';
      }
      const ripple = document.createElement('div');
      ripple.className = 'ripple';
      ripple.style.left = ex + 'px';
      ripple.style.top = ey + 'px';
      document.body.appendChild(ripple);
      ripple.addEventListener('animationend', () => ripple.remove());
      treeGrowth += 0.02;
      updateTreeWishes();
    }

    async function submitWish() {
      const text = wishInput.value.trim();
      if (!text) return;
      wishInput.value = '';
      // Auto-detect tag from text content; fall back to selectedTag if detection is general
      const detectedTag = detectTag(text);
      const tag = detectedTag !== 'general' ? detectedTag : selectedTag;

      // Always add locally first for immediate feedback
      const localWish = {
        id: 'local_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
        text,
        tag,
        created_at: new Date().toISOString(),
      };
      wishMessages.push(localWish);
      totalWishes = wishMessages.length;
      lastWishCount = totalWishes;
      wishCountEl.textContent = totalWishes;
      saveWishesToStorage();

      // Update wish wall immediately if open
      if (wishwallPanel.classList.contains('show')) renderWishWall();

      // Visual feedback
      const rect = glassCard.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      handleInteraction(cx, cy, text, tag);

      // Try to sync with Supabase
      if (supabase) {
        const { data: inserted, error } = await supabase
          .from('wishes').insert({ text, tag }).select().single();
        if (inserted) {
          // Preserve our tag if Supabase doesn't have a tag column
          if (!inserted.tag || inserted.tag === 'general') {
            inserted.tag = tag;
          }
          // Replace local wish with server version
          localInsertIds.add(inserted.id);
          const idx = wishMessages.findIndex(w => w.id === localWish.id);
          if (idx >= 0) {
            wishMessages[idx] = inserted;
            saveWishesToStorage(); // Remove local wish since it's now server-side
          }
          if (wishwallPanel.classList.contains('show')) renderWishWall();
        }
      }
    }

    // Tag selection
    wishTags.querySelectorAll('.wish-tag').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        selectedTag = btn.dataset.tag;
        wishTags.querySelectorAll('.wish-tag').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });
    // Set default active tag
    const defaultTagBtn = wishTags.querySelector('[data-tag="general"]');
    if (defaultTagBtn) defaultTagBtn.classList.add('active');

    document.addEventListener('click', (e) => {
      if (constellationDrawMode) return;
      if (e.target === wishInput || e.target === wishSendBtn) return;
      if (e.target.closest('.msg-popup-overlay')) return;
      if (e.target.closest('.bottle-panel')) return;
      if (e.target.closest('.bottle-btn')) return;
      if (e.target.closest('.bottle-backdrop')) return;
      if (e.target.closest('.wishwall-panel')) return;
      if (e.target.closest('.wishwall-btn')) return;
      if (e.target.closest('.wishwall-backdrop')) return;
      if (e.target.closest('.timecapsule-panel')) return;
      if (e.target.closest('.timecapsule-btn')) return;
      if (e.target.closest('.galaxy-panel')) return;
      if (e.target.closest('.galaxy-btn')) return;
      if (e.target.closest('.ai-panel')) return;
      if (e.target.closest('.ai-btn')) return;
      if (e.target.closest('.tree-panel')) return;
      if (e.target.closest('.growth-tree-btn')) return;
      if (e.target.closest('.constellation-btn')) return;
      if (e.target.closest('.constellation-toolbar')) return;
      if (e.target.closest('.wish-tag')) return;
      if (e.target.closest('.meteor-banner')) return;
      handleInteraction(e.clientX, e.clientY);
    });

    document.addEventListener('touchstart', (e) => {
      if (e.target === wishInput || e.target === wishSendBtn) return;
      if (e.target.closest('.msg-popup-overlay')) return;
      if (e.target.closest('.bottle-panel')) return;
      if (e.target.closest('.bottle-btn')) return;
      if (e.target.closest('.bottle-backdrop')) return;
      if (e.target.closest('.wishwall-panel')) return;
      if (e.target.closest('.wishwall-btn')) return;
      if (e.target.closest('.wishwall-backdrop')) return;
      if (e.target.closest('.timecapsule-panel')) return;
      if (e.target.closest('.timecapsule-btn')) return;
      if (e.target.closest('.galaxy-panel')) return;
      if (e.target.closest('.galaxy-btn')) return;
      if (e.target.closest('.ai-panel')) return;
      if (e.target.closest('.ai-btn')) return;
      if (e.target.closest('.tree-panel')) return;
      if (e.target.closest('.growth-tree-btn')) return;
      if (e.target.closest('.constellation-btn')) return;
      if (e.target.closest('.constellation-toolbar')) return;
      if (e.target.closest('.wish-tag')) return;
      if (e.target.closest('.meteor-banner')) return;
      if (e.touches.length === 1) {
        handleInteraction(e.touches[0].clientX, e.touches[0].clientY);
      }
    }, { passive: true });

    wishInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); submitWish(); }
    });

    wishSendBtn.addEventListener('click', (e) => { e.stopPropagation(); submitWish(); });
    wishInput.addEventListener('click', (e) => { e.stopPropagation(); });

    document.addEventListener('mousemove', (e) => {
      targetMouseX = e.clientX;
      targetMouseY = e.clientY;
    });

    document.addEventListener('touchmove', (e) => {
      if (e.touches.length === 1) {
        targetMouseX = e.touches[0].clientX;
        targetMouseY = e.touches[0].clientY;
      }
    }, { passive: true });

    /* ═══════════════════════════════════════════════════════════════════════
       FLOATING WISH MESSAGES
       ═══════════════════════════════════════════════════════════════════════ */
    function spawnFloatingWish(text) {
      const el = document.createElement('span');
      el.className = 'floating-wish';
      el.textContent = text;
      const x = 8 + Math.random() * 84;
      el.style.left = x + '%';
      const dur = 8 + Math.random() * 5;
      el.style.animationDuration = dur + 's';
      floatingWishes.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }

    function scheduleFloatingWishes() {
      if (wishMessages.length === 0) return;
      const idx = Math.floor(Math.random() * wishMessages.length);
      spawnFloatingWish(wishMessages[idx].text);
      const delay = 3000 + Math.random() * 5000;
      setTimeout(scheduleFloatingWishes, delay);
    }

    function burstFloatingWishes() {
      if (wishMessages.length === 0) return;
      const count = Math.min(5, wishMessages.length);
      const shuffled = [...wishMessages].sort(() => Math.random() - 0.5);
      const selected = shuffled.slice(0, count);
      selected.forEach((wish, i) => {
        setTimeout(() => spawnFloatingWish(wish.text), i * 400);
      });
    }

    /* ═══════════════════════════════════════════════════════════════════════
       SHOOTING STAR SPAWNER
       ═══════════════════════════════════════════════════════════════════════ */
    function scheduleShootingStar() {
      const delay = CONFIG.shootingStarInterval[0] +
        Math.random() * (CONFIG.shootingStarInterval[1] - CONFIG.shootingStarInterval[0]);
      setTimeout(() => {
        spawnShootingStar();
        scheduleShootingStar();
      }, delay);
    }

    /* ═══════════════════════════════════════════════════════════════════════
       PARALLAX ON GLASS CARD
       ═══════════════════════════════════════════════════════════════════════ */
    function updateParallax() {
      const dx = (mouseX - W / 2) / W;
      const dy = (mouseY - H / 2) / H;
      glassCard.style.setProperty('--parallax-x', `${dx * 8}px`);
      glassCard.style.setProperty('--parallax-y', `${dy * 8}px`);
      requestAnimationFrame(() => updateParallax());
    }

    /* ═══════════════════════════════════════════════════════════════════════
       INIT
       ═══════════════════════════════════════════════════════════════════════ */
    async function init() {
      resize();
      window.addEventListener('resize', resize);
      // Always load local data first
      loadWishesFromStorage();
      loadTimeCapsulesFromStorage();
      if (wishMessages.length > 0) {
        totalWishes = wishMessages.length;
        lastWishCount = totalWishes;
        wishCountEl.textContent = totalWishes;
      }
      const ok = initSupabase();
      if (ok) {
        await loadFromSupabase();
        setupRealtime();
      } else {
        connectionDot.classList.add('offline');
        connectionDot.textContent = '离线模式';
      }
      scheduleShootingStar();
      scheduleMeteorShower();
      updateParallax();
      requestAnimationFrame(loop);
      const initialStars = 8;
      for (let i = 0; i < initialStars && i < heartPoints.length; i++) {
        const idx = Math.floor((i / initialStars) * heartPoints.length);
        const p = heartPoints[idx];
        settledStars.push({
          x: p.x, y: p.y,
          r: 1.2 + Math.random() * 1,
          pulseOffset: Math.random() * Math.PI * 2,
          tag: 'general',
        });
      }
      wishCountEl.textContent = totalWishes;
      wishCounter.classList.add('visible');
      wishInputArea.classList.add('visible');
      wishTags.classList.add('visible');
      updateBottleBadge();
      updateTimeCapsuleBadge();
      if (wishMessages.length > 0) {
        setTimeout(burstFloatingWishes, 1500);
        setTimeout(() => scheduleFloatingWishes(), 1500 + Math.min(5, wishMessages.length) * 400 + 1000);
      }
      setTimeout(() => spawnShootingStar(), 1500);
      updateTreeWishes();
    }

    init();
  })();
  </script>
</body>
